version: "3.9"

networks:
  iot-net:
    driver: bridge

volumes:
  zookeeper_data:
  kafka_data:
  clickhouse_data:

services:

  # ─── MQTT Broker ────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - iot-net
    restart: unless-stopped

  # ─── Zookeeper (Kafka dependency) ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - iot-net
    restart: unless-stopped

  # ─── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1

    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - iot-net
    restart: unless-stopped

  # ─── MQTT → Kafka Bridge ─────────────────────────────────────────────────────
  mqtt-kafka-bridge:
    build: ./kafka-bridge
    container_name: mqtt-kafka-bridge
    depends_on:
      - mosquitto
      - kafka
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      MQTT_TOPIC: sensors/#
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: iot-sensor-data
    networks:
      - iot-net
    restart: unless-stopped

  # ─── IoT Sensor Simulator ────────────────────────────────────────────────────
  sensor-simulator:
    build: ./sensors
    container_name: sensor-simulator
    depends_on:
      - mosquitto
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      PUBLISH_INTERVAL_SECONDS: "2"
    networks:
      - iot-net
    restart: unless-stopped

  # ─── ClickHouse ──────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/initdb:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: iot
      CLICKHOUSE_USER: iot_user
      CLICKHOUSE_PASSWORD: iot_pass
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    networks:
      - iot-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  # ─── Apache Spark ─────────────────────────────────────────────────────────────
  spark:
    build: ./spark
    container_name: spark
    depends_on:
      - kafka
      - clickhouse
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: iot-sensor-data
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: iot_user
      CLICKHOUSE_PASSWORD: iot_pass
      CLICKHOUSE_DB: iot
      # Snowflake — fill in your credentials in .env
      SNOWFLAKE_URL: ${SNOWFLAKE_URL:-}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
      SNOWFLAKE_DB: ${SNOWFLAKE_DB:-IOT_DB}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-PUBLIC}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-COMPUTE_WH}
    networks:
      - iot-net
    restart: unless-stopped

 # ─── CLICKHOUSE UI ─────────────────────────────────────────────────────────────
  clickhouse-ui:
    image: spoonest/clickhouse-tabix-web-client:stable
    container_name: clickhouse-ui
    ports:
      - "8124:80"
    networks:
      - iot-net
    restart: unless-stopped